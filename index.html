<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>基本情報 学習アプリ</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      line-height: 1.2;
    }
    .lead {
      color: var(--muted);
      margin: 0 0 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      display: block;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.05);
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }
    .card p {
      margin: 0;
      color: var(--muted);
    }
    .note {
      margin-top: 20px;
      padding: 14px;
      border-radius: 16px;
      background: #eef2ff;
      color: #312e81;
    }
  </style>
</head>
<body>
  <main>
    <h1>基本情報 学習アプリ</h1>
    <p class="lead">学習したいアプリを選んでください。</p>

    <div class="grid">
      <a class="card" href="./venn.html">
        <h2>ベン図トレーナー</h2>
        <p>集合・論理式・条件検索をベン図で確認します。</p>
      </a>

      <a class="card" href="./logic.html">
        <h2>論理回路トレーナー</h2>
        <p>AND/OR/XOR、半加算器、全加算器をシミュレーションできます。</p>
      </a>
    </div>

    <div class="note">
      GitHub Pagesで公開する場合は、このページを入口にしてください。
    </div>
  </main>
</body>
</html>
